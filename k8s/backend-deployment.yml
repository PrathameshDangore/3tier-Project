apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 3tier-devops-project-backend:latest
        imagePullPolicy: Never
        env:
        - name: DB_HOST
          value: "mariadb"
        - name: DB_USER
          value: "root"
        - name: DB_PASS
          value: "secret"
        - name: DB_NAME
          value: "appdb"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
  - port: 3000
    targetPort: 3000